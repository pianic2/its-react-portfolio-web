<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redirecting…</title>
    <script>
      ;(() => {
        const basePath = '/its-react-portfolio-web/'
        const recoveryKey = 'irpw:pages-route-recovery'
        const requestedLocation = `${window.location.pathname}${window.location.search}${window.location.hash}`

        if (!window.location.pathname.startsWith(basePath)) {
          window.location.replace(basePath)
          return
        }

        try {
          window.sessionStorage.setItem(recoveryKey, requestedLocation)
        } catch {
          // Continue to the project root when storage is unavailable.
        }

        window.location.replace(basePath)
      })()
    </script>
  </head>
  <body>
    <p>Redirecting to the portfolio…</p>
  </body>
</html>
