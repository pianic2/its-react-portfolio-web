name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Report runtime versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Generate formatting diagnostic
        run: npm run format

      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-files
          path: |
            src/components/navigation/SiteHeader.tsx
            src/content/data/en.ts
            src/content/data/it.ts
            src/content/schema.ts
            src/features/home/ContactSection.tsx
            src/features/home/HomeHero.tsx
            src/features/home/SkillsSection.tsx
          if-no-files-found: error
          retention-days: 1

      - name: Check formatting
        run: git diff --exit-code

      - name: Lint source
        run: npm run lint

      - name: Type-check project
        run: npm run typecheck

      - name: Validate content
        run: npm run content:validate

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        run: npm run build
