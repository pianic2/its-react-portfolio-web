name: Quality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair-route-tests:
    if: github.actor == 'pianic2' && github.head_ref == 'agent/irpw-21-pr-quality-checks'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.head_ref }}

      - name: Align Home assertions with rendered structure
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/routes/AppRoutes.test.tsx')
          content = path.read_text()
          content = content.replace(
              "    expect(screen.getByText('FULL STACK DEVELOPER IN TRAINING')).toBeInTheDocument()",
              "    expect(screen.getByText('FULL STACK DEVELOPER')).toBeInTheDocument()\n    expect(screen.getByText('IN TRAINING')).toBeInTheDocument()",
          )
          content = content.replace(
              "    expect(screen.getByText('FULL STACK DEVELOPER IN FORMAZIONE')).toBeInTheDocument()",
              "    expect(screen.getByText('FULL STACK DEVELOPER')).toBeInTheDocument()\n    expect(screen.getByText('IN FORMAZIONE')).toBeInTheDocument()",
          )
          content = content.replace(
              "    expect(screen.getByTestId('learning-items').children).toHaveLength(3)",
              "    expect(screen.getByTestId('learning-items').children).toHaveLength(6)",
          )
          path.write_text(content)
          PY

      - name: Commit repaired route tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/routes/AppRoutes.test.tsx
          git diff --cached --quiet || git commit -m "test(IRPW-21): align Home route assertions"
          git push
